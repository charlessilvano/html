<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Painel de Manutenção TI</title>
    
    <!-- PWA Manifest e Tema -->
    <link rel="manifest" href="manifest.json">
    <meta name="theme-color" content="#0f172a" media="(prefers-color-scheme: dark)">
    <meta name="theme-color" content="#f8fafc" media="(prefers-color-scheme: light)">
    
    <!-- Fonte Inter -->
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght=300;400;500;600;700&display=swap" rel="stylesheet">
    
    <!-- Tailwind CSS (CDN para arquivo único) -->
    <script src="https://cdn.tailwindcss.com"></script>
    <script>
        tailwind.config = {
            darkMode: 'media', // Automático pelo sistema operacional
            theme: {
                extend: {
                    fontFamily: {
                        sans: ['Inter', 'sans-serif'],
                    },
                }
            }
        }
    </script>
    
    <style>
        /* Estilos personalizados mínimos para a scrollbar do terminal */
        .terminal-scroll::-webkit-scrollbar { width: 8px; }
        .terminal-scroll::-webkit-scrollbar-track { background: #1e293b; border-radius: 4px; }
        .terminal-scroll::-webkit-scrollbar-thumb { background: #475569; border-radius: 4px; }
    </style>
</head>
<body class="bg-slate-50 dark:bg-slate-900 text-slate-800 dark:text-slate-200 transition-colors duration-200 min-h-screen flex flex-col">

    <!-- Cabeçalho -->
    <header class="bg-white dark:bg-slate-800 shadow-sm border-b border-slate-200 dark:border-slate-700 sticky top-0 z-10">
        <div class="max-w-5xl mx-auto px-4 py-4 flex justify-between items-center">
            <div class="flex items-center gap-3">
                <svg class="w-8 h-8 text-blue-600 dark:text-blue-400" fill="none" stroke="currentColor" viewBox="0 0 24 24" xmlns="http://www.w3.org/2000/svg"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M5 12h14M5 12a2 2 0 01-2-2V6a2 2 0 012-2h14a2 2 0 012 2v4a2 2 0 01-2 2M5 12a2 2 0 00-2 2v4a2 2 0 002 2h14a2 2 0 002-2v-4a2 2 0 00-2-2m-2-4h.01M17 16h.01"></path></svg>
                <h1 class="font-bold text-xl tracking-tight">Manutenção Remota</h1>
            </div>
            <div id="statusIndicator" class="flex items-center gap-2 text-sm font-medium text-emerald-600 dark:text-emerald-400">
                <span class="relative flex h-3 w-3">
                  <span class="animate-ping absolute inline-flex h-full w-full rounded-full bg-emerald-400 opacity-75"></span>
                  <span class="relative inline-flex rounded-full h-3 w-3 bg-emerald-500"></span>
                </span>
                Online
            </div>
        </div>
    </header>

    <!-- Conteúdo Principal -->
    <main class="flex-grow max-w-5xl mx-auto w-full px-4 py-8 flex flex-col gap-6">
        
        <!-- Configuração de Alvo -->
        <section class="bg-white dark:bg-slate-800 rounded-2xl p-6 shadow-sm border border-slate-200 dark:border-slate-700">
            <h2 class="text-lg font-semibold mb-4 flex items-center gap-2">
                <svg class="w-5 h-5 text-slate-500" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M21 12a9 9 0 01-9 9m9-9a9 9 0 00-9-9m9 9H3m9 9a9 9 0 01-9-9m9 9c1.657 0 3-4.03 3-9s-1.343-9-3-9m0 18c-1.657 0-3-4.03-3-9s1.343-9 3-9m-9 9a9 9 0 019-9"></path></svg>
                Máquina Alvo (IP Local)
            </h2>
            <div class="flex flex-col sm:flex-row gap-4">
                <input type="text" id="ipInput" placeholder="Ex: 192.168.1.100" class="flex-grow bg-slate-50 dark:bg-slate-900 border border-slate-300 dark:border-slate-600 rounded-lg px-4 py-3 text-slate-800 dark:text-white focus:outline-none focus:ring-2 focus:ring-blue-500 transition-shadow w-full font-mono">
            </div>
        </section>

        <!-- Navegação de Abas -->
        <div class="flex space-x-2 border-b border-slate-200 dark:border-slate-700 overflow-x-auto">
            <button onclick="mudarAba('tab-instalacao')" id="btn-tab-instalacao" class="aba-btn px-4 py-2 font-medium text-blue-600 border-b-2 border-blue-600 whitespace-nowrap">Instalação Inicial</button>
            <button onclick="mudarAba('tab-manutencao')" id="btn-tab-manutencao" class="aba-btn px-4 py-2 font-medium text-slate-500 hover:text-slate-700 dark:hover:text-slate-300 border-b-2 border-transparent whitespace-nowrap">Manutenção</button>
            <button onclick="mudarAba('tab-analise')" id="btn-tab-analise" class="aba-btn px-4 py-2 font-medium text-slate-500 hover:text-slate-700 dark:hover:text-slate-300 border-b-2 border-transparent whitespace-nowrap">Análise</button>
        </div>

        <!-- ABA 1: INSTALAÇÃO INICIAL -->
        <section id="tab-instalacao" class="aba-conteudo space-y-4">
            <div class="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-3 gap-4">
                <button onclick="executarAcao('instalar-agente', 'Instalando Agente em Background...')" class="card-acao">
                    <h3 class="font-semibold mb-1 text-slate-900 dark:text-white">1. Instalar Agente Fixo</h3>
                    <p class="text-xs text-slate-500">Baixa em C:\\Temp e agenda início automático no boot do sistema.</p>
                </button>
                <button onclick="executarAcao('ativar-admin', 'Ativando Conta Administrador Local...')" class="card-acao">
                    <h3 class="font-semibold mb-1 text-slate-900 dark:text-white">2. Ativar Administrador</h3>
                    <p class="text-xs text-slate-500">Ativa a conta padrão e define a senha "conterplan@2016".</p>
                </button>
                <button onclick="executarAcao('winget-upgrade', 'Atualizando Apps via WinGet...')" class="card-acao">
                    <h3 class="font-semibold mb-1 text-slate-900 dark:text-white">3. WinGet Upgrade All</h3>
                    <p class="text-xs text-slate-500">Atualiza todos os aplicativos instalados via WinGet de forma silenciosa.</p>
                </button>
                <button onclick="executarAcao('renomear-disco', 'Configurando rótulo do disco e ativando SNMP...')" class="card-acao">
                    <h3 class="font-semibold mb-1 text-slate-900 dark:text-white">4. Renomear C: & SNMP</h3>
                    <p class="text-xs text-slate-500">Define o nome para "Windows" e instala a feature SNMP.</p>
                </button>
                <button onclick="executarAcao('configurar-wallpaper', 'Configurando Papel de Parede Corporativo...')" class="card-acao">
                    <h3 class="font-semibold mb-1 text-slate-900 dark:text-white">7. Papel de Parede</h3>
                    <p class="text-xs text-slate-500">Ativa slideshow da pasta ThemeC e aplica cor de destaque Automática.</p>
                </button>
                <button onclick="executarAcao('instalar-office', 'Iniciando Instalação Silenciosa do Office 365...')" class="card-acao">
                    <h3 class="font-semibold mb-1 text-slate-900 dark:text-white">8. Instalar Office 365</h3>
                    <p class="text-xs text-slate-500">Baixa instalador oficial na pasta temporária e o executa silenciosamente.</p>
                </button>
                <button onclick="executarAcao('instalar-pdf', 'Instalando leitores de PDF via WinGet...')" class="card-acao">
                    <h3 class="font-semibold mb-1 text-slate-900 dark:text-white">9. Foxit & PDF24</h3>
                    <p class="text-xs text-slate-500">Instala os leitores de PDF corporativos no usuário logado.</p>
                </button>
            </div>

            <!-- Formulários Complexos da Instalação -->
            <div class="grid grid-cols-1 md:grid-cols-2 gap-4 mt-4">
                <!-- Alterar DNS -->
                <div class="bg-white dark:bg-slate-800 p-4 rounded-xl border border-slate-200 dark:border-slate-700">
                    <h3 class="font-semibold mb-2">5. Alterar DNS da Rede</h3>
                    <div class="flex gap-2">
                        <input type="text" id="inputDns1" placeholder="DNS 1 (Ex: 10.0.0.1)" class="input-padrao w-full">
                        <button onclick="executarAcao('alterar-dns', 'Alterando DNS...', { dns1: document.getElementById('inputDns1').value })" class="btn-primario whitespace-nowrap">Aplicar</button>
                    </div>
                </div>

                <!-- Active Directory -->
                <div class="bg-white dark:bg-slate-800 p-4 rounded-xl border border-slate-200 dark:border-slate-700">
                    <h3 class="font-semibold mb-2">6. Conectar ao Domínio Active Directory</h3>
                    <div class="space-y-2">
                        <input type="text" id="adDomain" placeholder="Domínio (Ex: corporativo.local)" class="input-padrao w-full">
                        <div class="flex gap-2">
                            <input type="text" id="adUser" placeholder="Usuário AD" class="input-padrao w-1/2">
                            <input type="password" id="adPass" placeholder="Senha" class="input-padrao w-1/2">
                        </div>
                        <button onclick="executarAcao('ingressar-dominio', 'Ingressando no Domínio...', { dominio: document.getElementById('adDomain').value, usuario: document.getElementById('adUser').value, senha: document.getElementById('adPass').value })" class="btn-primario w-full">Ingressar (Requer Reinicialização)</button>
                    </div>
                </div>
            </div>
        </section>

        <!-- ABA 2: MANUTENÇÃO -->
        <section id="tab-manutencao" class="aba-conteudo space-y-4 hidden">
            <div class="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-3 gap-4">
                <button onclick="executarAcao('limpeza-disco', 'Iniciando Limpeza de Disco Avançada...')" class="card-acao border-amber-200 dark:border-amber-900">
                    <h3 class="font-semibold mb-1 text-amber-600 dark:text-amber-400">1. Limpeza Profunda</h3>
                    <p class="text-xs text-slate-500">Configura o cleanmgr para marcar tudo e executa silenciosamente.</p>
                </button>
                <button onclick="executarAcao('sfc-scannow', 'Iniciando varredura com SFC /scannow (Acompanhe a cada 5s)...')" class="card-acao">
                    <h3 class="font-semibold mb-1 text-slate-900 dark:text-white">2. SFC /ScanNow</h3>
                    <p class="text-xs text-slate-500">Procura e corrige arquivos corrompidos da integridade do Windows.</p>
                </button>
                <button onclick="executarAcao('dism-restore', 'Executando DISM RestoreHealth (Pode demorar)...')" class="card-acao">
                    <h3 class="font-semibold mb-1 text-slate-900 dark:text-white">3. DISM Restore</h3>
                    <p class="text-xs text-slate-500">Restaura a integridade da imagem de sistema e núcleos do SO.</p>
                </button>
                <button onclick="executarAcao('restart-spooler', 'Reiniciando Spooler de Impressão...')" class="card-acao">
                    <h3 class="font-semibold mb-1 text-slate-900 dark:text-white">4. Resetar Impressoras</h3>
                    <p class="text-xs text-slate-500">Destrava e reinicia o serviço do Spooler limpando a fila pendente.</p>
                </button>
                <button onclick="executarAcao('reset-rede', 'Restaura a Rede local e DNS para Automático...')" class="card-acao">
                    <h3 class="font-semibold mb-1 text-slate-900 dark:text-white">5. Restaurar Rede DHCP</h3>
                    <p class="text-xs text-slate-500">Configura adaptadores para obter IP/DNS automático e reinicia a rede.</p>
                </button>
            </div>
            
            <!-- Comando Manual -->
            <div class="bg-white dark:bg-slate-800 p-4 rounded-xl border border-slate-200 dark:border-slate-700">
                <h3 class="font-semibold mb-2">6. Enviar Comando PowerShell Customizado</h3>
                <div class="flex gap-2">
                    <input type="text" id="cmdInput" placeholder="Ex: Get-Process | Select-Object -First 5" class="input-padrao w-full font-mono text-sm">
                    <button onclick="executarAcao('comando-manual', 'Executando script manual...', { comando: document.getElementById('cmdInput').value })" class="bg-slate-800 hover:bg-black text-white px-4 py-2 rounded-lg font-medium transition-colors">Enviar</button>
                </div>
            </div>
        </section>

        <!-- ABA 3: ANÁLISE -->
        <section id="tab-analise" class="aba-conteudo space-y-4 hidden">
            <div class="grid grid-cols-1 md:grid-cols-2 gap-4">
                <button onclick="executarAcao('info-sistema', 'Requisitando informações de hardware e usuário...')" class="card-acao bg-indigo-50 dark:bg-indigo-900/20 border-indigo-200 dark:border-indigo-800">
                    <h3 class="font-semibold mb-1 text-indigo-700 dark:text-indigo-400">1. Consultar Info na Tela</h3>
                    <p class="text-xs text-slate-500">Obtém processador, RAM, usuário ativo e SO direto no terminal abaixo.</p>
                </button>
                <button onclick="baixarRelatorioInfo()" class="card-acao bg-emerald-50 dark:bg-emerald-900/20 border-emerald-200 dark:border-emerald-800 hover:border-emerald-400">
                    <h3 class="font-semibold mb-1 text-emerald-700 dark:text-emerald-400">2. Baixar Relatório (TXT)</h3>
                    <p class="text-xs text-slate-500">Busca os dados do sistema em tempo real e inicia o download de um arquivo .txt.</p>
                </button>
            </div>
        </section>

        <!-- Painel de Terminal / Log -->
        <section class="flex-grow flex flex-col min-h-[350px]">
            <div class="flex justify-between items-center mb-2">
                <h2 class="text-lg font-semibold flex items-center gap-2">
                    <span class="inline-block w-2.5 h-2.5 rounded-full bg-emerald-500"></span>
                    Terminal de Transmissão ao Vivo
                </h2>
                <button onclick="limparLog()" class="text-xs text-slate-500 hover:text-slate-800 dark:hover:text-white transition-colors bg-slate-200 dark:bg-slate-800 px-3 py-1.5 rounded-lg">Limpar Terminal</button>
            </div>
            <div id="terminalOutput" class="flex-grow bg-slate-950 border border-slate-800 rounded-2xl p-5 font-mono text-sm text-emerald-400 shadow-2xl overflow-y-auto terminal-scroll whitespace-pre-wrap flex flex-col">
                <span class="text-slate-500">Agente aguardando requisições... Pronto para execução rápida.</span>
            </div>
        </section>

    </main>

    <style>
        /* CSS Auxiliar do Painel */
        .card-acao { @apply bg-white dark:bg-slate-800 hover:bg-slate-100 dark:hover:bg-slate-700 border border-slate-200 dark:border-slate-700 rounded-xl p-4 shadow-sm text-left transition-all hover:-translate-y-1; }
        .input-padrao { @apply bg-slate-50 dark:bg-slate-900 border border-slate-300 dark:border-slate-600 rounded-lg px-3 py-2 text-slate-800 dark:text-white focus:outline-none focus:ring-2 focus:ring-blue-500 transition-shadow; }
        .btn-primario { @apply bg-blue-600 hover:bg-blue-700 text-white px-4 py-2 rounded-lg font-medium transition-colors shadow-sm; }
    </style>

    <script>
        // Controle de Abas
        function mudarAba(idAba) {
            document.querySelectorAll('.aba-conteudo').forEach(el => el.classList.add('hidden'));
            document.querySelectorAll('.aba-btn').forEach(el => {
                el.classList.remove('text-blue-600', 'border-blue-600', 'dark:text-blue-400');
                el.classList.add('text-slate-500', 'border-transparent');
            });
            
            document.getElementById(idAba).classList.remove('hidden');
            const btnAtivo = document.getElementById('btn-' + idAba);
            btnAtivo.classList.remove('text-slate-500', 'border-transparent');
            btnAtivo.classList.add('text-blue-600', 'border-blue-600', 'dark:text-blue-400');
        }

        // Service Worker (Offline)
        if ('serviceWorker' in navigator) {
            window.addEventListener('load', () => { navigator.serviceWorker.register('./sw.js'); });
        }

        // Monitorar Status de Rede do Técnico
        function updateOnlineStatus() {
            const status = document.getElementById('statusIndicator');
            if (navigator.onLine) {
                status.innerHTML = `<span class="relative flex h-3 w-3 mr-1"><span class="animate-ping absolute inline-flex h-full w-full rounded-full bg-emerald-400 opacity-75"></span><span class="relative inline-flex rounded-full h-3 w-3 bg-emerald-500"></span></span> Online`;
                status.className = "flex items-center text-sm font-medium text-emerald-600 dark:text-emerald-400";
            } else {
                status.innerHTML = `<span class="relative flex h-3 w-3 mr-1"><span class="relative inline-flex rounded-full h-3 w-3 bg-red-500"></span></span> Offline (Modo Local)`;
                status.className = "flex items-center text-sm font-medium text-red-600 dark:text-red-400";
            }
        }
        window.addEventListener('online', updateOnlineStatus);
        window.addEventListener('offline', updateOnlineStatus);
        updateOnlineStatus();

        // Escrever em tempo real na tela usando pre
        function logStream(text, isNewCommand = false) {
            const terminal = document.getElementById('terminalOutput');
            
            // Remove o placeholder se houver
            if (terminal.querySelector('.text-slate-500') && terminal.children.length === 1) {
                terminal.innerHTML = '';
            }

            if (isNewCommand) {
                const time = new Date().toLocaleTimeString();
                const header = document.createElement('div');
                header.className = 'text-blue-400 font-semibold mt-4 border-t border-slate-800 pt-3 flex items-center justify-between';
                header.innerHTML = `<span>[${time}] > Comando Iniciado</span><span class="animate-pulse inline-block w-2 h-2 rounded-full bg-blue-400"></span>`;
                terminal.appendChild(header);
            }

            let streamBlock = document.getElementById('activeStreamBlock');
            if (!streamBlock || isNewCommand) {
                if (streamBlock) {
                    streamBlock.removeAttribute('id');
                }
                streamBlock = document.createElement('pre');
                streamBlock.id = 'activeStreamBlock';
                streamBlock.className = 'whitespace-pre-wrap font-mono text-sm text-emerald-400 leading-relaxed mt-1';
                terminal.appendChild(streamBlock);
            }

            streamBlock.textContent += text;
            terminal.scrollTop = terminal.scrollHeight;
        }

        function limparLog() {
            document.getElementById('terminalOutput').innerHTML = '<span class="text-slate-500">Terminal limpo. Aguardando novos comandos...</span>\n';
        }

        function getIp() {
            const ip = document.getElementById('ipInput').value.trim();
            if (!ip) {
                logStream('\nERRO: Digite o IP Local da máquina alvo antes de prosseguir.\n', true);
                return null;
            }
            return ip;
        }

        // Executar Ações com Suporte a Transmissão Assíncrona de Logs (Sem Travar)
        async function executarAcao(endpoint, msgInicio, payloadObj = null) {
            const ip = getIp(); if (!ip) return;
            
            // Se houver payload, verificar se todos os campos estão preenchidos
            if (payloadObj) {
                for (const key in payloadObj) {
                    if (!payloadObj[key]) {
                        logStream(`\nERRO: Preencha todos os dados exigidos pelo formulário para realizar esta ação.\n`, true);
                        return;
                    }
                }
            }

            logStream(`\n${msgInicio}\nConectando em http://${ip}:5000/api/${endpoint}...\n`, true);

            try {
                const options = {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' }
                };
                if (payloadObj) {
                    options.body = JSON.stringify(payloadObj);
                }

                const response = await fetch(`http://${ip}:5000/api/${endpoint}`, options);
                
                if (!response.ok) {
                    logStream(`\n[FALHA] Código de erro HTTP: ${response.status}\n`, false);
                    return;
                }

                // Iniciar a leitura em fluxo do corpo da resposta HTTP
                const reader = response.body.getReader();
                const decoder = new TextDecoder("utf-8");

                while (true) {
                    const { done, value } = await reader.read();
                    if (done) break;
                    const chunk = decoder.decode(value, { stream: true });
                    logStream(chunk, false); // Escreve o fragmento de log imediatamente na tela
                }
                
                logStream(`\n[SUCESSO] Operação finalizada.\n`, false);

            } catch (error) {
                logStream(`\n[FALHA DE COMUNICAÇÃO] O agente está rodando na máquina ${ip}? Verifique a porta 5000 e o Firewall.\n`, false);
            }
        }

        // Função Especial: Baixar Relatório
        async function baixarRelatorioInfo() {
            const ip = getIp(); if (!ip) return;
            logStream(`\nRequisitando geração de informações do sistema...\n`, true);
            
            try {
                const response = await fetch(`http://${ip}:5000/api/info-sistema`, { method: 'POST' });
                
                if (!response.ok) {
                    logStream(`\n[ERRO] Falha ao consultar o sistema: ${response.status}\n`, false);
                    return;
                }

                const reader = response.body.getReader();
                const decoder = new TextDecoder("utf-8");
                let textAccumulator = "";

                while (true) {
                    const { done, value } = await reader.read();
                    if (done) break;
                    const chunk = decoder.decode(value, { stream: true });
                    textAccumulator += chunk;
                    logStream(chunk, false);
                }

                // Iniciar download no navegador
                const blob = new Blob([textAccumulator], { type: 'text/plain' });
                const url = window.URL.createObjectURL(blob);
                const a = document.createElement('a');
                a.style.display = 'none';
                a.href = url;
                a.download = `Relatorio_Sistema_${ip}_${new Date().getTime()}.txt`;
                document.body.appendChild(a);
                a.click();
                window.URL.revokeObjectURL(url);
                logStream(`\n[SUCESSO] Relatório compilado e baixado no seu computador!`, false);

            } catch (error) {
                logStream(`\n[FALHA] Sem rede ou o agente de escuta está desativado na porta 5000.\n`, false);
            }
        }
    </script>
</body>
</html>
