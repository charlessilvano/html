<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Motor de Execução Remota</title>
    
    <link rel="manifest" href="manifest.json">
    <meta name="theme-color" content="#0f172a" media="(prefers-color-scheme: dark)">
    <meta name="theme-color" content="#f8fafc" media="(prefers-color-scheme: light)">
    
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <script src="https://cdn.tailwindcss.com"></script>
    <script>
        tailwind.config = { darkMode: 'media', theme: { extend: { fontFamily: { sans: ['Inter', 'sans-serif'], } } } }
    </script>
    
    <script src="https://cdnjs.cloudflare.com/ajax/libs/pdfmake/0.2.7/pdfmake.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/pdfmake/0.2.7/vfs_fonts.js"></script>

    <style>
        .terminal-scroll::-webkit-scrollbar { width: 8px; }
        .terminal-scroll::-webkit-scrollbar-track { background: #1e293b; border-radius: 4px; }
        .terminal-scroll::-webkit-scrollbar-thumb { background: #475569; border-radius: 4px; }
        .tab-active { border-bottom: 2px solid #3b82f6; color: #3b82f6; font-weight: 600; }
        .gantt-bar { transition: width 0.3s ease; }
    </style>
</head>
<body class="bg-slate-50 dark:bg-slate-900 text-slate-800 dark:text-slate-200 min-h-screen flex flex-col">

    <header class="bg-white dark:bg-slate-800 shadow-sm border-b border-slate-200 dark:border-slate-700 sticky top-0 z-10">
        <div class="max-w-6xl mx-auto px-4 py-3 flex flex-col sm:flex-row sm:items-center justify-between gap-4">
            <div class="flex items-center gap-3">
                <svg class="w-8 h-8 text-blue-600 dark:text-blue-400" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M5 12h14M5 12a2 2 0 01-2-2V6a2 2 0 012-2h14a2 2 0 012 2v4a2 2 0 01-2 2M5 12a2 2 0 00-2 2v4a2 2 0 002 2h14a2 2 0 002-2v-4a2 2 0 00-2-2m-2-4h.01M17 16h.01"></path></svg>
                <h1 class="font-bold text-xl">Motor de Automação</h1>
            </div>
            <div class="flex items-center gap-4 w-full sm:w-auto">
                <input type="text" id="ipInput" placeholder="IP Alvo (ex: 192.168.1.100)" class="w-full sm:w-64 bg-slate-100 dark:bg-slate-900 border border-slate-300 dark:border-slate-600 rounded-md px-3 py-2 text-sm focus:ring-2 focus:ring-blue-500 font-mono">
            </div>
        </div>
        <div class="max-w-6xl mx-auto px-4 mt-2 flex gap-6 overflow-x-auto text-sm">
            <button onclick="switchTab('tab-biblioteca')" id="nav-biblioteca" class="pb-2 text-slate-500 hover:text-slate-800 dark:hover:text-white tab-active whitespace-nowrap">Biblioteca de Comandos</button>
            <button onclick="switchTab('tab-fila')" id="nav-fila" class="pb-2 text-slate-500 hover:text-slate-800 dark:hover:text-white whitespace-nowrap">Fila de Execução</button>
            <button onclick="switchTab('tab-terminal')" id="nav-terminal" class="pb-2 text-slate-500 hover:text-slate-800 dark:hover:text-white whitespace-nowrap">Terminal (Logs)</button>
            <button onclick="switchTab('tab-gantt')" id="nav-gantt" class="pb-2 text-slate-500 hover:text-slate-800 dark:hover:text-white whitespace-nowrap">Relatório & Gantt</button>
        </div>
    </header>

    <main class="flex-grow max-w-6xl mx-auto w-full px-4 py-6">
        
        <div id="tab-biblioteca" class="block">
            <div class="grid grid-cols-1 lg:grid-cols-3 gap-6">
                <div class="bg-white dark:bg-slate-800 p-5 rounded-xl shadow-sm border border-slate-200 dark:border-slate-700 h-fit">
                    <h2 class="font-semibold mb-4">Novo Comando</h2>
                    <input type="text" id="cmdNome" placeholder="Nome da Tarefa" class="w-full mb-3 bg-slate-50 dark:bg-slate-900 border border-slate-300 dark:border-slate-600 rounded-md px-3 py-2 text-sm">
                    <input type="text" id="cmdTag" placeholder="Etiqueta (ex: Servidor, AD, Manutenção)" class="w-full mb-3 bg-slate-50 dark:bg-slate-900 border border-slate-300 dark:border-slate-600 rounded-md px-3 py-2 text-sm">
                    <textarea id="cmdScript" placeholder="Código PowerShell..." class="w-full mb-3 bg-slate-50 dark:bg-slate-900 border border-slate-300 dark:border-slate-600 rounded-md px-3 py-2 text-sm font-mono h-32"></textarea>
                    <button onclick="salvarComando()" class="w-full bg-blue-600 hover:bg-blue-700 text-white font-medium py-2 rounded-md transition-colors text-sm">Salvar na Biblioteca</button>
                </div>
                <div class="lg:col-span-2">
                    <div id="listaBiblioteca" class="grid grid-cols-1 sm:grid-cols-2 gap-4">
                        </div>
                </div>
            </div>
        </div>

        <div id="tab-fila" class="hidden">
            <div class="bg-white dark:bg-slate-800 rounded-xl shadow-sm border border-slate-200 dark:border-slate-700 p-5">
                <div class="flex justify-between items-center mb-4">
                    <h2 class="font-semibold">Fila de Tarefas</h2>
                    <div class="space-x-2">
                        <button onclick="limparFila()" class="text-sm text-red-500 hover:underline">Limpar Fila</button>
                        <button onclick="iniciarFila()" class="bg-emerald-600 hover:bg-emerald-700 text-white font-medium py-1.5 px-4 rounded-md transition-colors text-sm">▶ Executar Fila no IP</button>
                    </div>
                </div>
                <div id="listaFila" class="space-y-2">
                    <p class="text-sm text-slate-500 text-center py-8">Nenhum comando na fila. Vá até a Biblioteca e adicione.</p>
                </div>
            </div>
        </div>

        <div id="tab-terminal" class="hidden h-full">
            <div class="bg-slate-900 rounded-xl p-4 font-mono text-sm text-emerald-400 shadow-inner h-[600px] overflow-y-auto terminal-scroll flex flex-col relative">
                <div class="sticky top-0 bg-slate-900 pb-2 mb-2 border-b border-slate-700 flex justify-between items-center z-10">
                    <span class="text-slate-300">Monitor de Execução</span>
                    <button onclick="limparTerminal()" class="text-xs text-slate-500 hover:text-white">Limpar Log</button>
                </div>
                <div id="terminalOutput" class="whitespace-pre-wrap flex-grow pb-4"></div>
            </div>
        </div>

        <div id="tab-gantt" class="hidden">
            <div class="bg-white dark:bg-slate-800 rounded-xl shadow-sm border border-slate-200 dark:border-slate-700 p-5">
                <div class="flex justify-between items-center mb-6">
                    <h2 class="font-semibold">Análise de Tempo (Gantt)</h2>
                    <button onclick="exportarPDF()" class="bg-red-600 hover:bg-red-700 text-white font-medium py-1.5 px-4 rounded-md transition-colors text-sm flex items-center gap-2">
                        <svg class="w-4 h-4" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M12 10v6m0 0l-3-3m3 3l3-3m2 8H7a2 2 0 01-2-2V5a2 2 0 012-2h5.586a1 1 0 01.707.293l5.414 5.414a1 1 0 01.293.707V19a2 2 0 01-2 2z"></path></svg>
                        Exportar Relatório PDF
                    </button>
                </div>
                
                <div id="ganttContainer" class="w-full overflow-x-auto pb-4">
                    <p class="text-sm text-slate-500 text-center py-8">Execute uma fila para gerar o gráfico de tempo.</p>
                </div>
            </div>
        </div>

    </main>

    <script>
        // --- ESTADO DA APLICAÇÃO ---
        let biblioteca = JSON.parse(localStorage.getItem('comandosTI')) || [];
        let filaExecucao = [];
        let executando = false;

        // --- SISTEMA DE ABAS ---
        function switchTab(tabId) {
            ['tab-biblioteca', 'tab-fila', 'tab-terminal', 'tab-gantt'].forEach(t => {
                document.getElementById(t).classList.add('hidden');
                document.getElementById(t.replace('tab-', 'nav-')).classList.remove('tab-active');
            });
            document.getElementById(tabId).classList.remove('hidden');
            document.getElementById(tabId.replace('tab-', 'nav-')).classList.add('tab-active');
            if(tabId === 'tab-gantt') renderGantt();
        }

        // --- BIBLIOTECA (CRUD) ---
        function salvarComando() {
            const nome = document.getElementById('cmdNome').value.trim();
            const tag = document.getElementById('cmdTag').value.trim();
            const script = document.getElementById('cmdScript').value.trim();

            if(!nome || !script) return alert("Nome e Script são obrigatórios.");

            biblioteca.push({ id: Date.now().toString(), nome, tag, script });
            localStorage.setItem('comandosTI', JSON.stringify(biblioteca));
            
            document.getElementById('cmdNome').value = ''; document.getElementById('cmdTag').value = ''; document.getElementById('cmdScript').value = '';
            renderBiblioteca();
        }

        function deletarComando(id) {
            biblioteca = biblioteca.filter(c => c.id !== id);
            localStorage.setItem('comandosTI', JSON.stringify(biblioteca));
            renderBiblioteca();
        }

        function renderBiblioteca() {
            const container = document.getElementById('listaBiblioteca');
            if(biblioteca.length === 0) {
                container.innerHTML = '<p class="text-sm text-slate-500 col-span-2">Sua biblioteca está vazia.</p>';
                return;
            }
            container.innerHTML = biblioteca.map(cmd => `
                <div class="bg-white dark:bg-slate-800 p-4 rounded-xl border border-slate-200 dark:border-slate-700 shadow-sm flex flex-col justify-between group">
                    <div>
                        <div class="flex justify-between items-start mb-2">
                            <h3 class="font-semibold text-sm">${cmd.nome}</h3>
                            <span class="text-[10px] font-bold px-2 py-0.5 rounded bg-blue-100 text-blue-700 dark:bg-blue-900 dark:text-blue-300 uppercase tracking-wide">${cmd.tag || 'GERAL'}</span>
                        </div>
                        <pre class="text-[10px] text-slate-500 font-mono bg-slate-50 dark:bg-slate-900 p-2 rounded max-h-20 overflow-y-auto mb-3 border border-slate-100 dark:border-slate-800">${cmd.script}</pre>
                    </div>
                    <div class="flex justify-between mt-2 pt-2 border-t border-slate-100 dark:border-slate-700">
                        <button onclick="deletarComando('${cmd.id}')" class="text-xs text-red-500 hover:text-red-700">Excluir</button>
                        <button onclick="adicionarFila('${cmd.id}')" class="text-xs font-medium text-white bg-slate-800 dark:bg-slate-600 px-3 py-1 rounded hover:bg-slate-700 dark:hover:bg-slate-500 transition-colors">+ Add Fila</button>
                    </div>
                </div>
            `).join('');
        }

        // --- FILA DE EXECUÇÃO ---
        function adicionarFila(id) {
            const cmd = biblioteca.find(c => c.id === id);
            if(cmd) {
                // Adicionamos uma cópia com UUID de execução e campos de tempo
                filaExecucao.push({ 
                    ...cmd, 
                    execId: Date.now() + Math.random().toString(), 
                    status: 'Pendente', 
                    inicio: null, 
                    fim: null,
                    duracaoMs: 0,
                    log: '' 
                });
                renderFila();
                // Notificação visual simples
                const btn = event.target;
                const txt = btn.innerText;
                btn.innerText = "✓ Adicionado";
                btn.classList.add("bg-emerald-600");
                setTimeout(() => { btn.innerText = txt; btn.classList.remove("bg-emerald-600"); }, 1000);
            }
        }

        function limparFila() { filaExecucao = []; renderFila(); }

        function renderFila() {
            const container = document.getElementById('listaFila');
            if(filaExecucao.length === 0) {
                container.innerHTML = '<p class="text-sm text-slate-500 text-center py-8">Nenhum comando na fila.</p>';
                return;
            }
            container.innerHTML = filaExecucao.map((cmd, index) => `
                <div class="flex items-center justify-between p-3 bg-slate-50 dark:bg-slate-800/50 rounded-lg border border-slate-200 dark:border-slate-700">
                    <div class="flex items-center gap-3">
                        <span class="text-slate-400 font-mono text-xs w-4">${index + 1}.</span>
                        <div>
                            <p class="font-medium text-sm">${cmd.nome}</p>
                            <p class="text-xs text-slate-500">Status: <strong class="${getStatusColor(cmd.status)}">${cmd.status}</strong></p>
                        </div>
                    </div>
                    ${cmd.status === 'Pendente' ? `<button onclick="removerDaFila(${index})" class="text-slate-400 hover:text-red-500">×</button>` : `<span class="text-xs font-mono text-slate-400">${cmd.duracaoMs > 0 ? (cmd.duracaoMs/1000).toFixed(1) + 's' : ''}</span>`}
                </div>
            `).join('');
        }

        function removerDaFila(index) { filaExecucao.splice(index, 1); renderFila(); }
        
        function getStatusColor(status) {
            if(status === 'Rodando...') return 'text-blue-500 animate-pulse';
            if(status === 'Concluído') return 'text-emerald-500';
            if(status === 'Erro') return 'text-red-500';
            return 'text-slate-500';
        }

        // --- EXECUÇÃO E TERMINAL ---
        const terminal = document.getElementById('terminalOutput');
        function logTerm(msg, isHeader = false) {
            const time = new Date().toLocaleTimeString();
            const div = document.createElement('div');
            div.className = isHeader ? 'text-blue-300 mt-4 mb-1 font-bold' : 'mb-0.5 ml-2';
            div.innerHTML = isHeader ? `>>> ${msg}` : `<span class="text-slate-600 mr-2">[${time}]</span>${msg}`;
            terminal.appendChild(div);
            terminal.parentElement.scrollTop = terminal.parentElement.scrollHeight;
        }
        function limparTerminal() { terminal.innerHTML = ''; }

        async function iniciarFila() {
            const ip = document.getElementById('ipInput').value.trim();
            if(!ip) return alert("Digite o IP alvo antes de iniciar.");
            if(filaExecucao.length === 0) return alert("A fila está vazia.");
            if(executando) return;

            executando = true;
            switchTab('tab-terminal');
            
            for(let i = 0; i < filaExecucao.length; i++) {
                let tarefa = filaExecucao[i];
                if(tarefa.status === 'Concluído') continue;

                tarefa.status = 'Rodando...';
                tarefa.inicio = new Date();
                renderFila();
                
                logTerm(`Iniciando Tarefa [${i+1}/${filaExecucao.length}]: ${tarefa.nome}`, true);

                try {
                    const response = await fetch(`http://${ip}:5000/api/executar`, {
                        method: 'POST',
                        headers: { 'Content-Type': 'application/json' },
                        body: JSON.stringify({ comando: tarefa.script })
                    });

                    if (!response.body) throw new Error("Sem suporte a stream");
                    
                    const reader = response.body.getReader();
                    const decoder = new TextDecoder("utf-8");
                    
                    while (true) {
                        const { done, value } = await reader.read();
                        if (done) break;
                        const chunk = decoder.decode(value, { stream: true });
                        tarefa.log += chunk;
                        logTerm(chunk.trim());
                    }
                    tarefa.status = 'Concluído';
                } catch (error) {
                    tarefa.status = 'Erro';
                    tarefa.log += `\nFALHA DE REDE: ${error.message}`;
                    logTerm(`ERRO DE CONEXÃO: ${error.message}`);
                }

                tarefa.fim = new Date();
                tarefa.duracaoMs = tarefa.fim - tarefa.inicio;
                renderFila();
            }

            logTerm("====== FILA FINALIZADA ======", true);
            executando = false;
        }

        // --- GANTT E RELATÓRIO ---
        function renderGantt() {
            const container = document.getElementById('ganttContainer');
            const executadas = filaExecucao.filter(t => t.inicio && t.fim);
            
            if(executadas.length === 0) {
                container.innerHTML = '<p class="text-sm text-slate-500 text-center py-8">Nenhuma métrica de tempo capturada ainda.</p>';
                return;
            }

            const tempoMinimo = Math.min(...executadas.map(t => t.inicio.getTime()));
            const tempoMaximo = Math.max(...executadas.map(t => t.fim.getTime()));
            const duracaoTotal = tempoMaximo - tempoMinimo;

            let html = `<div class="relative min-w-[600px] mt-4 border-l border-slate-300 dark:border-slate-600 pl-4 space-y-6">`;
            
            executadas.forEach(tarefa => {
                const startPos = ((tarefa.inicio.getTime() - tempoMinimo) / duracaoTotal) * 100;
                let width = (tarefa.duracaoMs / duracaoTotal) * 100;
                if(width < 1) width = 1; // Para comandos muito rápidos ficarem visíveis

                html += `
                <div class="relative h-10 w-full group">
                    <div class="absolute -left-36 w-32 text-right pr-2 truncate text-sm font-medium text-slate-600 dark:text-slate-300 leading-6" title="${tarefa.nome}">${tarefa.nome}</div>
                    <div class="absolute h-6 rounded bg-blue-500 shadow-sm gantt-bar flex items-center px-2 text-[10px] text-white overflow-hidden whitespace-nowrap" 
                         style="left: ${startPos}%; width: ${width}%;">
                        ${(tarefa.duracaoMs / 1000).toFixed(1)}s
                    </div>
                </div>`;
            });

            html += `</div>`;
            container.innerHTML = html;
        }

        function exportarPDF() {
            const executadas = filaExecucao.filter(t => t.inicio && t.fim);
            if(executadas.length === 0) return alert("Não há tarefas concluídas para exportar.");

            const tableBody = [
                [{ text: 'Tarefa', style: 'tableHeader' }, { text: 'Etiqueta', style: 'tableHeader' }, { text: 'Duração', style: 'tableHeader' }, { text: 'Status', style: 'tableHeader' }]
            ];

            executadas.forEach(t => {
                tableBody.push([
                    t.nome, 
                    t.tag, 
                    (t.duracaoMs/1000).toFixed(1) + 's',
                    { text: t.status, color: t.status === 'Concluído' ? 'green' : 'red' }
                ]);
            });

            // Adiciona logs detalhados
            const logsSection = [];
            executadas.forEach(t => {
                logsSection.push({ text: `Log: ${t.nome}`, style: 'subheader', margin: [0, 15, 0, 5] });
                logsSection.push({ text: t.log.substring(0, 1500) + (t.log.length > 1500 ? '\n...[Log Truncado]' : ''), style: 'codeBlock' });
            });

            const docDefinition = {
                content: [
                    { text: 'Relatório de Execução de Manutenção TI', style: 'header' },
                    { text: `Data: ${new Date().toLocaleString()}`, margin: [0, 0, 0, 10] },
                    { text: `IP Alvo: ${document.getElementById('ipInput').value || 'Desconhecido'}`, margin: [0, 0, 0, 20] },
                    {
                        table: {
                            headerRows: 1,
                            widths: ['*', 'auto', 'auto', 'auto'],
                            body: tableBody
                        },
                        layout: 'lightHorizontalLines'
                    },
                    ...logsSection
                ],
                styles: {
                    header: { fontSize: 18, bold: true },
                    subheader: { fontSize: 14, bold: true },
                    tableHeader: { bold: true, fontSize: 12, color: 'black' },
                    codeBlock: { font: 'Roboto', fontSize: 9, background: '#f4f4f4', padding: 5 }
                }
            };

            pdfMake.createPdf(docDefinition).download(`RelatorioTI_${Date.now()}.pdf`);
        }

        // Init
        renderBiblioteca();
    </script>
</body>
</html>
