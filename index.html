<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Painel de Manutenção TI</title>
    
    <!-- PWA Manifest e Tema -->
    <link rel="manifest" href="manifest.json">
    <meta name="theme-color" content="#0f172a" media="(prefers-color-scheme: dark)">
    <meta name="theme-color" content="#f8fafc" media="(prefers-color-scheme: light)">
    
    <!-- Fonte Inter -->
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    
    <!-- Tailwind CSS (CDN para arquivo único) -->
    <script src="https://cdn.tailwindcss.com"></script>
    <script>
        tailwind.config = {
            darkMode: 'media', // Automático pelo sistema operacional
            theme: {
                extend: {
                    fontFamily: {
                        sans: ['Inter', 'sans-serif'],
                    },
                }
            }
        }
    </script>
    
    <style>
        /* Estilos personalizados mínimos para a scrollbar do terminal */
        .terminal-scroll::-webkit-scrollbar { width: 8px; }
        .terminal-scroll::-webkit-scrollbar-track { background: #1e293b; border-radius: 4px; }
        .terminal-scroll::-webkit-scrollbar-thumb { background: #475569; border-radius: 4px; }
    </style>
</head>
<body class="bg-slate-50 dark:bg-slate-900 text-slate-800 dark:text-slate-200 transition-colors duration-200 min-h-screen flex flex-col">

    <!-- Cabeçalho -->
    <header class="bg-white dark:bg-slate-800 shadow-sm border-b border-slate-200 dark:border-slate-700 sticky top-0 z-10">
        <div class="max-w-5xl mx-auto px-4 py-4 flex justify-between items-center">
            <div class="flex items-center gap-3">
                <svg class="w-8 h-8 text-blue-600 dark:text-blue-400" fill="none" stroke="currentColor" viewBox="0 0 24 24" xmlns="http://www.w3.org/2000/svg"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M5 12h14M5 12a2 2 0 01-2-2V6a2 2 0 012-2h14a2 2 0 012 2v4a2 2 0 01-2 2M5 12a2 2 0 00-2 2v4a2 2 0 002 2h14a2 2 0 002-2v-4a2 2 0 00-2-2m-2-4h.01M17 16h.01"></path></svg>
                <h1 class="font-bold text-xl tracking-tight">Manutenção Remota</h1>
            </div>
            <div id="statusIndicator" class="flex items-center gap-2 text-sm font-medium text-emerald-600 dark:text-emerald-400">
                <span class="relative flex h-3 w-3">
                  <span class="animate-ping absolute inline-flex h-full w-full rounded-full bg-emerald-400 opacity-75"></span>
                  <span class="relative inline-flex rounded-full h-3 w-3 bg-emerald-500"></span>
                </span>
                Online
            </div>
        </div>
    </header>

    <!-- Conteúdo Principal -->
    <main class="flex-grow max-w-5xl mx-auto w-full px-4 py-8 flex flex-col gap-6">
        
        <!-- Configuração de Alvo -->
        <section class="bg-white dark:bg-slate-800 rounded-2xl p-6 shadow-sm border border-slate-200 dark:border-slate-700">
            <h2 class="text-lg font-semibold mb-4 flex items-center gap-2">
                <svg class="w-5 h-5 text-slate-500" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M21 12a9 9 0 01-9 9m9-9a9 9 0 00-9-9m9 9H3m9 9a9 9 0 01-9-9m9 9c1.657 0 3-4.03 3-9s-1.343-9-3-9m0 18c-1.657 0-3-4.03-3-9s1.343-9 3-9m-9 9a9 9 0 019-9"></path></svg>
                Máquina Alvo (IP Local)
            </h2>
            <div class="flex flex-col sm:flex-row gap-4">
                <input type="text" id="ipInput" placeholder="Ex: 192.168.1.100" class="flex-grow bg-slate-50 dark:bg-slate-900 border border-slate-300 dark:border-slate-600 rounded-lg px-4 py-3 text-slate-800 dark:text-white focus:outline-none focus:ring-2 focus:ring-blue-500 transition-shadow w-full font-mono">
            </div>
        </section>

        <!-- Navegação de Abas -->
        <div class="flex space-x-2 border-b border-slate-200 dark:border-slate-700 overflow-x-auto">
            <button onclick="mudarAba('tab-instalacao')" id="btn-tab-instalacao" class="aba-btn px-4 py-2 font-medium text-blue-600 border-b-2 border-blue-600 whitespace-nowrap">Instalação Inicial</button>
            <button onclick="mudarAba('tab-manutencao')" id="btn-tab-manutencao" class="aba-btn px-4 py-2 font-medium text-slate-500 hover:text-slate-700 dark:hover:text-slate-300 border-b-2 border-transparent whitespace-nowrap">Manutenção</button>
            <button onclick="mudarAba('tab-analise')" id="btn-tab-analise" class="aba-btn px-4 py-2 font-medium text-slate-500 hover:text-slate-700 dark:hover:text-slate-300 border-b-2 border-transparent whitespace-nowrap">Análise</button>
        </div>

        <!-- ABA 1: INSTALAÇÃO INICIAL -->
        <section id="tab-instalacao" class="aba-conteudo space-y-4">
            <div class="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-3 gap-4">
                <button onclick="executarAcao('instalar-agente', 'Instalando Agente em Background...')" class="card-acao">
                    <h3 class="font-semibold mb-1">1. Instalar Agente Fixo</h3>
                    <p class="text-xs text-slate-500">Baixa em C:\Temp e agenda inicio automático no boot.</p>
                </button>
                <button onclick="executarAcao('ativar-admin', 'Ativando Administrador...')" class="card-acao">
                    <h3 class="font-semibold mb-1">2. Ativar Administrador</h3>
                    <p class="text-xs text-slate-500">Ativa a conta e define senha padrão.</p>
                </button>
                <button onclick="executarAcao('winget-upgrade', 'Atualizando Apps via WinGet...')" class="card-acao">
                    <h3 class="font-semibold mb-1">3. WinGet Upgrade All</h3>
                    <p class="text-xs text-slate-500">Atualiza todos os aplicativos de terceiros do sistema.</p>
                </button>
                <button onclick="executarAcao('renomear-disco', 'Configurando Disco e SNMP...')" class="card-acao">
                    <h3 class="font-semibold mb-1">4. Disco Windows & SNMP</h3>
                    <p class="text-xs text-slate-500">Renomeia C: e instala feature SNMP do Windows.</p>
                </button>
                <button onclick="executarAcao('configurar-wallpaper', 'Configurando Papel de Parede...')" class="card-acao">
                    <h3 class="font-semibold mb-1">7. Papel de Parede</h3>
                    <p class="text-xs text-slate-500">Slideshow ThemeC e Cor de destaque automática.</p>
                </button>
                <button onclick="executarAcao('instalar-office', 'Instalando Office 365...')" class="card-acao">
                    <h3 class="font-semibold mb-1">8. Office 365</h3>
                    <p class="text-xs text-slate-500">Baixa e executa OfficeSetup.exe silenciosamente.</p>
                </button>
                <button onclick="executarAcao('instalar-pdf', 'Instalando leitores PDF...')" class="card-acao">
                    <h3 class="font-semibold mb-1">9. Foxit & PDF24</h3>
                    <p class="text-xs text-slate-500">Instala via WinGet no usuário logado.</p>
                </button>
            </div>

            <!-- Formulários Complexos da Instalação -->
            <div class="grid grid-cols-1 md:grid-cols-2 gap-4 mt-4">
                <!-- Alterar DNS -->
                <div class="bg-white dark:bg-slate-800 p-4 rounded-xl border border-slate-200 dark:border-slate-700">
                    <h3 class="font-semibold mb-2">5. Alterar DNS (DNS 2 Fixo 8.8.8.8)</h3>
                    <div class="flex gap-2">
                        <input type="text" id="inputDns1" placeholder="DNS 1 (Ex: 10.0.0.1)" class="input-padrao w-full">
                        <button onclick="enviarFormulario('alterar-dns', { dns1: document.getElementById('inputDns1').value }, 'Alterando DNS...')" class="btn-primario whitespace-nowrap">Aplicar</button>
                    </div>
                </div>

                <!-- Active Directory -->
                <div class="bg-white dark:bg-slate-800 p-4 rounded-xl border border-slate-200 dark:border-slate-700">
                    <h3 class="font-semibold mb-2">6. Conectar ao Domínio AD</h3>
                    <div class="space-y-2">
                        <input type="text" id="adDomain" placeholder="Domínio (Ex: meudominio.local)" class="input-padrao w-full">
                        <div class="flex gap-2">
                            <input type="text" id="adUser" placeholder="Usuário" class="input-padrao w-1/2">
                            <input type="password" id="adPass" placeholder="Senha" class="input-padrao w-1/2">
                        </div>
                        <button onclick="enviarFormulario('ingressar-dominio', { dominio: document.getElementById('adDomain').value, usuario: document.getElementById('adUser').value, senha: document.getElementById('adPass').value }, 'Ingressando no Domínio...')" class="btn-primario w-full">Ingressar (Requer Reiniciar Após)</button>
                    </div>
                </div>
            </div>
        </section>

        <!-- ABA 2: MANUTENÇÃO -->
        <section id="tab-manutencao" class="aba-conteudo space-y-4 hidden">
            <div class="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-3 gap-4">
                <button onclick="executarAcao('limpeza-disco', 'Executando Cleanmgr...')" class="card-acao border-amber-200 dark:border-amber-900">
                    <h3 class="font-semibold mb-1 text-amber-600 dark:text-amber-400">1. Limpeza Profunda</h3>
                    <p class="text-xs text-slate-500">Configura e roda Sagerun:10 do Cleanmgr.</p>
                </button>
                <button onclick="executarAcao('sfc-scannow', 'Rodando SFC /ScanNow...')" class="card-acao">
                    <h3 class="font-semibold mb-1">2. SFC /ScanNow</h3>
                    <p class="text-xs text-slate-500">Verifica e repara arquivos corrompidos do SO.</p>
                </button>
                <button onclick="executarAcao('dism-restore', 'Rodando DISM RestoreHealth...')" class="card-acao">
                    <h3 class="font-semibold mb-1">3. DISM RestoreHealth</h3>
                    <p class="text-xs text-slate-500">Repara a imagem e os núcleos do sistema.</p>
                </button>
                <button onclick="executarAcao('restart-spooler', 'Reiniciando Spooler...')" class="card-acao">
                    <h3 class="font-semibold mb-1">4. Spooler Impressão</h3>
                    <p class="text-xs text-slate-500">Destrava fila de impressão presa.</p>
                </button>
                <button onclick="executarAcao('reset-rede', 'Resetando DNS e Rede...')" class="card-acao">
                    <h3 class="font-semibold mb-1">5. Resetar Rede</h3>
                    <p class="text-xs text-slate-500">Restaura DNS automático (DHCP) e reinicia adaptador.</p>
                </button>
            </div>
            
            <!-- Comando Manual -->
            <div class="bg-white dark:bg-slate-800 p-4 rounded-xl border border-slate-200 dark:border-slate-700">
                <h3 class="font-semibold mb-2">6. Executar Comando Manual (PowerShell)</h3>
                <div class="flex gap-2">
                    <input type="text" id="cmdInput" placeholder="Ex: Get-Process | Select-Object -First 5" class="input-padrao w-full font-mono text-sm">
                    <button onclick="enviarFormulario('comando-manual', { comando: document.getElementById('cmdInput').value }, 'Executando comando customizado...')" class="bg-slate-800 hover:bg-black text-white px-4 py-2 rounded-lg font-medium transition-colors">Enviar</button>
                </div>
            </div>
        </section>

        <!-- ABA 3: ANÁLISE -->
        <section id="tab-analise" class="aba-conteudo space-y-4 hidden">
            <div class="grid grid-cols-1 md:grid-cols-2 gap-4">
                <button onclick="executarAcao('info-sistema', 'Coletando informações de hardware e usuário...')" class="card-acao bg-indigo-50 dark:bg-indigo-900/20 border-indigo-200 dark:border-indigo-800">
                    <h3 class="font-semibold mb-1 text-indigo-700 dark:text-indigo-400">1. Consultar Info na Tela</h3>
                    <p class="text-xs text-slate-500">Exibe hardware, versão do OS e usuário logado no log abaixo.</p>
                </button>
                <button onclick="baixarRelatorioInfo()" class="card-acao bg-emerald-50 dark:bg-emerald-900/20 border-emerald-200 dark:border-emerald-800 hover:border-emerald-400">
                    <h3 class="font-semibold mb-1 text-emerald-700 dark:text-emerald-400">2. Baixar Relatório (TXT)</h3>
                    <p class="text-xs text-slate-500">Gera e faz download de um arquivo com os dados da máquina.</p>
                </button>
            </div>
        </section>

        <!-- Painel de Terminal / Log -->
        <section class="flex-grow flex flex-col min-h-[300px]">
            <h2 class="text-lg font-semibold mb-2 flex items-center justify-between">
                <span>Output Remoto (Log)</span>
                <button onclick="limparLog()" class="text-sm text-slate-500 hover:text-slate-800 dark:hover:text-white transition-colors">Limpar</button>
            </h2>
            <div id="terminalOutput" class="flex-grow bg-slate-900 rounded-2xl p-4 font-mono text-sm text-emerald-400 shadow-inner overflow-y-auto terminal-scroll whitespace-pre-wrap flex flex-col">
                <span class="text-slate-500">Agente aguardando comandos...</span>
            </div>
        </section>

    </main>

    <style>
        /* Estilos Utilitários Adicionados para limpar o HTML */
        .card-acao { @apply bg-white dark:bg-slate-800 hover:bg-slate-50 dark:hover:bg-slate-700 border border-slate-200 dark:border-slate-700 rounded-xl p-4 shadow-sm text-left transition-all hover:-translate-y-1; }
        .input-padrao { @apply bg-slate-50 dark:bg-slate-900 border border-slate-300 dark:border-slate-600 rounded-lg px-3 py-2 text-slate-800 dark:text-white focus:outline-none focus:ring-2 focus:ring-blue-500 transition-shadow; }
        .btn-primario { @apply bg-blue-600 hover:bg-blue-700 text-white px-4 py-2 rounded-lg font-medium transition-colors shadow-sm; }
    </style>

    <script>
        // Controle de Abas
        function mudarAba(idAba) {
            document.querySelectorAll('.aba-conteudo').forEach(el => el.classList.add('hidden'));
            document.querySelectorAll('.aba-btn').forEach(el => {
                el.classList.remove('text-blue-600', 'border-blue-600', 'dark:text-blue-400');
                el.classList.add('text-slate-500', 'border-transparent');
            });
            
            document.getElementById(idAba).classList.remove('hidden');
            const btnAtivo = document.getElementById('btn-' + idAba);
            btnAtivo.classList.remove('text-slate-500', 'border-transparent');
            btnAtivo.classList.add('text-blue-600', 'border-blue-600', 'dark:text-blue-400');
        }

        // Service Worker (Mantido)
        if ('serviceWorker' in navigator) {
            window.addEventListener('load', () => { navigator.serviceWorker.register('./sw.js'); });
        }

        // Monitorar Status da Internet (Mantido)
        function updateOnlineStatus() {
            const status = document.getElementById('statusIndicator');
            if (navigator.onLine) {
                status.innerHTML = `<span class="relative flex h-3 w-3 mr-2"><span class="animate-ping absolute inline-flex h-full w-full rounded-full bg-emerald-400 opacity-75"></span><span class="relative inline-flex rounded-full h-3 w-3 bg-emerald-500"></span></span> Online`;
                status.className = "flex items-center text-sm font-medium text-emerald-600 dark:text-emerald-400";
            } else {
                status.innerHTML = `<span class="relative flex h-3 w-3 mr-2"><span class="relative inline-flex rounded-full h-3 w-3 bg-red-500"></span></span> Offline`;
                status.className = "flex items-center text-sm font-medium text-red-600 dark:text-red-400";
            }
        }
        window.addEventListener('online', updateOnlineStatus);
        window.addEventListener('offline', updateOnlineStatus);
        updateOnlineStatus();

        // Escrever no Terminal
        function log(message, isError = false) {
            const terminal = document.getElementById('terminalOutput');
            const time = new Date().toLocaleTimeString();
            const colorClass = isError ? 'text-red-400' : 'text-emerald-400';
            const p = document.createElement('div');
            p.className = `mb-1 ${colorClass}`;
            p.innerHTML = `<span class="text-slate-500">[${time}]</span> ${message}`;
            terminal.appendChild(p);
            terminal.scrollTop = terminal.scrollHeight;
        }

        function limparLog() {
            document.getElementById('terminalOutput').innerHTML = '<span class="text-slate-500">Log limpo. Aguardando comandos...</span>\n';
        }

        function getIp() {
            const ip = document.getElementById('ipInput').value.trim();
            if (!ip) { log('ERRO: Digite o IP Local da máquina alvo.', true); return null; }
            return ip;
        }

        // Executar Ações Simples (GET/POST sem body)
        async function executarAcao(endpoint, msgInicio) {
            const ip = getIp(); if (!ip) return;
            log(`\n> ${msgInicio}`);
            
            try {
                const response = await fetch(`http://${ip}:5000/api/${endpoint}`, { method: 'POST' });
                const data = await response.json();
                if (response.ok) log(data.output || data.status);
                else log(`[FALHA HTTP] ${data.detail || response.status}`, true);
            } catch (error) {
                log(`[FALHA REDE] Erro ao conectar. O agente está rodando na porta 5000 em ${ip}?`, true);
            }
        }

        // Executar Ações com Dados de Formulário (POST com JSON)
        async function enviarFormulario(endpoint, payloadObj, msgInicio) {
            const ip = getIp(); if (!ip) return;
            
            // Validação simples
            for (const key in payloadObj) {
                if (!payloadObj[key]) {
                    log(`ERRO: Preencha todos os campos do formulário para esta ação.`, true);
                    return;
                }
            }

            log(`\n> ${msgInicio}`);
            
            try {
                const response = await fetch(`http://${ip}:5000/api/${endpoint}`, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify(payloadObj)
                });
                const data = await response.json();
                if (response.ok) log(data.output || data.status);
                else log(`[FALHA] ${data.detail || response.status}`, true);
            } catch (error) {
                log(`[FALHA REDE] Erro ao conectar com o agente.`, true);
            }
        }

        // Função Especial: Baixar Relatório
        async function baixarRelatorioInfo() {
            const ip = getIp(); if (!ip) return;
            log('\n> Solicitando geração de relatório para download...');
            
            try {
                const response = await fetch(`http://${ip}:5000/api/info-sistema`, { method: 'POST' });
                const data = await response.json();
                
                if (response.ok) {
                    const texto = data.output;
                    const blob = new Blob([texto], { type: 'text/plain' });
                    const url = window.URL.createObjectURL(blob);
                    const a = document.createElement('a');
                    a.style.display = 'none';
                    a.href = url;
                    a.download = `Relatorio_Hardware_${ip}_${new Date().getTime()}.txt`;
                    document.body.appendChild(a);
                    a.click();
                    window.URL.revokeObjectURL(url);
                    log('[SUCESSO] Relatório gerado e download iniciado no seu navegador!');
                } else {
                    log(`[ERRO] Falha ao gerar relatório: ${response.status}`, true);
                }
            } catch (error) {
                log(`[FALHA REDE] Erro ao conectar.`, true);
            }
        }
    </script>
</body>
</html>
