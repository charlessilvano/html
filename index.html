<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Painel de Manutenção TI</title>
    
    <!-- PWA Manifest e Tema -->
    <link rel="manifest" href="manifest.json">
    <meta name="theme-color" content="#0f172a" media="(prefers-color-scheme: dark)">
    <meta name="theme-color" content="#f8fafc" media="(prefers-color-scheme: light)">
    
    <!-- Fonte Inter -->
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    
    <!-- Tailwind CSS (CDN para arquivo único) -->
    <script src="https://cdn.tailwindcss.com"></script>
    <script>
        tailwind.config = {
            darkMode: 'media', // Automático pelo sistema operacional
            theme: {
                extend: {
                    fontFamily: {
                        sans: ['Inter', 'sans-serif'],
                    },
                }
            }
        }
    </script>
    
    <style>
        /* Estilos personalizados mínimos para a scrollbar do terminal */
        .terminal-scroll::-webkit-scrollbar { width: 8px; }
        .terminal-scroll::-webkit-scrollbar-track { background: #1e293b; border-radius: 4px; }
        .terminal-scroll::-webkit-scrollbar-thumb { background: #475569; border-radius: 4px; }
    </style>
</head>
<body class="bg-slate-50 dark:bg-slate-900 text-slate-800 dark:text-slate-200 transition-colors duration-200 min-h-screen flex flex-col">

    <!-- Cabeçalho -->
    <header class="bg-white dark:bg-slate-800 shadow-sm border-b border-slate-200 dark:border-slate-700 sticky top-0 z-10">
        <div class="max-w-5xl mx-auto px-4 py-4 flex justify-between items-center">
            <div class="flex items-center gap-3">
                <svg class="w-8 h-8 text-blue-600 dark:text-blue-400" fill="none" stroke="currentColor" viewBox="0 0 24 24" xmlns="http://www.w3.org/2000/svg"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M5 12h14M5 12a2 2 0 01-2-2V6a2 2 0 012-2h14a2 2 0 012 2v4a2 2 0 01-2 2M5 12a2 2 0 00-2 2v4a2 2 0 002 2h14a2 2 0 002-2v-4a2 2 0 00-2-2m-2-4h.01M17 16h.01"></path></svg>
                <h1 class="font-bold text-xl tracking-tight">Manutenção Remota</h1>
            </div>
            <div id="statusIndicator" class="flex items-center gap-2 text-sm font-medium text-emerald-600 dark:text-emerald-400">
                <span class="relative flex h-3 w-3">
                  <span class="animate-ping absolute inline-flex h-full w-full rounded-full bg-emerald-400 opacity-75"></span>
                  <span class="relative inline-flex rounded-full h-3 w-3 bg-emerald-500"></span>
                </span>
                Online
            </div>
        </div>
    </header>

    <!-- Conteúdo Principal -->
    <main class="flex-grow max-w-5xl mx-auto w-full px-4 py-8 flex flex-col gap-8">
        
        <!-- Configuração de Alvo -->
        <section class="bg-white dark:bg-slate-800 rounded-2xl p-6 shadow-sm border border-slate-200 dark:border-slate-700">
            <h2 class="text-lg font-semibold mb-4 flex items-center gap-2">
                <svg class="w-5 h-5 text-slate-500" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M21 12a9 9 0 01-9 9m9-9a9 9 0 00-9-9m9 9H3m9 9a9 9 0 01-9-9m9 9c1.657 0 3-4.03 3-9s-1.343-9-3-9m0 18c-1.657 0-3-4.03-3-9s1.343-9 3-9m-9 9a9 9 0 019-9"></path></svg>
                Máquina Alvo (IP Local)
            </h2>
            <div class="flex flex-col sm:flex-row gap-4">
                <input type="text" id="ipInput" placeholder="Ex: 192.168.1.100" class="flex-grow bg-slate-50 dark:bg-slate-900 border border-slate-300 dark:border-slate-600 rounded-lg px-4 py-3 text-slate-800 dark:text-white focus:outline-none focus:ring-2 focus:ring-blue-500 transition-shadow w-full font-mono">
            </div>
        </section>

        <!-- Ações de Manutenção -->
        <section>
            <h2 class="text-lg font-semibold mb-4">Ações Disponíveis</h2>
            <div class="grid grid-cols-1 md:grid-cols-3 gap-4">
                
                <!-- Card 1 -->
                <button onclick="executarAcao('windows-update', 'Verificando atualizações do Windows...')" class="bg-white dark:bg-slate-800 hover:bg-blue-50 dark:hover:bg-slate-700 border border-slate-200 dark:border-slate-700 rounded-2xl p-5 shadow-sm text-left transition-colors group">
                    <div class="bg-blue-100 dark:bg-blue-900/30 text-blue-600 dark:text-blue-400 w-10 h-10 rounded-lg flex items-center justify-center mb-3 group-hover:scale-110 transition-transform">
                        <svg class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M4 4v5h.582m15.356 2A8.001 8.001 0 004.582 9m0 0H9m11 11v-5h-.581m0 0a8.003 8.003 0 01-15.357-2m15.357 2H15"></path></svg>
                    </div>
                    <h3 class="font-semibold text-slate-800 dark:text-white mb-1">Windows Update</h3>
                    <p class="text-sm text-slate-500 dark:text-slate-400">Verifica, instala atualizações pendentes e gera logs.</p>
                </button>

                <!-- Card 2 -->
                <button onclick="executarAcao('limpar-temp', 'Limpando arquivos temporários...')" class="bg-white dark:bg-slate-800 hover:bg-amber-50 dark:hover:bg-slate-700 border border-slate-200 dark:border-slate-700 rounded-2xl p-5 shadow-sm text-left transition-colors group">
                    <div class="bg-amber-100 dark:bg-amber-900/30 text-amber-600 dark:text-amber-400 w-10 h-10 rounded-lg flex items-center justify-center mb-3 group-hover:scale-110 transition-transform">
                        <svg class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M19 7l-.867 12.142A2 2 0 0116.138 21H7.862a2 2 0 01-1.995-1.858L5 7m5 4v6m4-6v6m1-10V4a1 1 0 00-1-1h-4a1 1 0 00-1 1v3M4 7h16"></path></svg>
                    </div>
                    <h3 class="font-semibold text-slate-800 dark:text-white mb-1">Limpeza de Disco</h3>
                    <p class="text-sm text-slate-500 dark:text-slate-400">Remove arquivos em %TEMP% e lixeira.</p>
                </button>
                
                <!-- Card 3 -->
                <button onclick="executarAcao('restart-spooler', 'Reiniciando Spooler de Impressão...')" class="bg-white dark:bg-slate-800 hover:bg-purple-50 dark:hover:bg-slate-700 border border-slate-200 dark:border-slate-700 rounded-2xl p-5 shadow-sm text-left transition-colors group">
                    <div class="bg-purple-100 dark:bg-purple-900/30 text-purple-600 dark:text-purple-400 w-10 h-10 rounded-lg flex items-center justify-center mb-3 group-hover:scale-110 transition-transform">
                        <svg class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M17 17h2a2 2 0 002-2v-4a2 2 0 00-2-2H5a2 2 0 00-2 2v4a2 2 0 002 2h2m2 4h6a2 2 0 002-2v-4a2 2 0 00-2-2H9a2 2 0 00-2 2v4a2 2 0 002 2zm8-12V5a2 2 0 00-2-2H9a2 2 0 00-2 2v4h10z"></path></svg>
                    </div>
                    <h3 class="font-semibold text-slate-800 dark:text-white mb-1">Resetar Spooler</h3>
                    <p class="text-sm text-slate-500 dark:text-slate-400">Corrige fila travada reiniciando o serviço de impressão.</p>
                </button>

            </div>
        </section>

        <!-- Painel de Terminal / Log -->
        <section class="flex-grow flex flex-col min-h-[300px]">
            <h2 class="text-lg font-semibold mb-2 flex items-center justify-between">
                <span>Output Remoto (Log)</span>
                <button onclick="limparLog()" class="text-sm text-slate-500 hover:text-slate-800 dark:hover:text-white transition-colors">Limpar</button>
            </h2>
            <div id="terminalOutput" class="flex-grow bg-slate-900 rounded-2xl p-4 font-mono text-sm text-emerald-400 shadow-inner overflow-y-auto terminal-scroll whitespace-pre-wrap flex flex-col">
                <span class="text-slate-500">Agente aguardando conexões...</span>
            </div>
        </section>
    </main>

    <script>
        // Registro do Service Worker para PWA Offline
        if ('serviceWorker' in navigator) {
            window.addEventListener('load', () => {
                navigator.serviceWorker.register('./sw.js')
                    .then(reg => console.log('Service Worker Registrado!', reg))
                    .catch(err => console.error('Erro no Service Worker', err));
            });
        }

        // Monitorar Status da Internet
        function updateOnlineStatus() {
            const status = document.getElementById('statusIndicator');
            if (navigator.onLine) {
                status.innerHTML = `<span class="relative flex h-3 w-3"><span class="animate-ping absolute inline-flex h-full w-full rounded-full bg-emerald-400 opacity-75"></span><span class="relative inline-flex rounded-full h-3 w-3 bg-emerald-500"></span></span> Online`;
                status.className = "flex items-center gap-2 text-sm font-medium text-emerald-600 dark:text-emerald-400";
            } else {
                status.innerHTML = `<span class="relative flex h-3 w-3"><span class="relative inline-flex rounded-full h-3 w-3 bg-red-500"></span></span> Offline (Usando Cache)`;
                status.className = "flex items-center gap-2 text-sm font-medium text-red-600 dark:text-red-400";
            }
        }
        window.addEventListener('online', updateOnlineStatus);
        window.addEventListener('offline', updateOnlineStatus);
        updateOnlineStatus();

        // Escrever no Terminal
        function log(message, isError = false) {
            const terminal = document.getElementById('terminalOutput');
            const time = new Date().toLocaleTimeString();
            const colorClass = isError ? 'text-red-400' : 'text-emerald-400';
            
            const p = document.createElement('div');
            p.className = `mb-1 ${colorClass}`;
            p.innerHTML = `<span class="text-slate-500">[${time}]</span> ${message}`;
            
            terminal.appendChild(p);
            terminal.scrollTop = terminal.scrollHeight; // Auto-scroll
        }

        function limparLog() {
            document.getElementById('terminalOutput').innerHTML = '<span class="text-slate-500">Log limpo. Aguardando novos comandos...</span>\n';
        }

        // Executar Ações
        async function executarAcao(endpoint, msgInicio) {
            const ip = document.getElementById('ipInput').value.trim();
            if (!ip) {
                log('ERRO: Digite o IP Local da máquina alvo antes de executar.', true);
                return;
            }

            // Expressão regular básica para validar IPv4
            const ipRegex = /^(25[0-5]|2[0-4][0-9]|[01]?[0-9][0-9]?)\.(25[0-5]|2[0-4][0-9]|[01]?[0-9][0-9]?)\.(25[0-5]|2[0-4][0-9]|[01]?[0-9][0-9]?)\.(25[0-5]|2[0-4][0-9]|[01]?[0-9][0-9]?)$/;
            if (!ipRegex.test(ip)) {
                log('AVISO: Formato de IP pode ser inválido, tentando mesmo assim...', true);
            }

            log(`\n> Iniciando tarefa: ${msgInicio}`);
            log(`> Conectando ao Agente em http://${ip}:5000/api/${endpoint}...`);

            try {
                // A porta 5000 é onde a API C# local estará ouvindo
                const response = await fetch(`http://${ip}:5000/api/${endpoint}`, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    // timeout logic can be implemented using AbortController if needed
                });

                if (response.ok) {
                    const data = await response.json();
                    log(`[SUCESSO] Retorno da Máquina Alvo:`);
                    log(data.output);
                } else {
                    log(`[FALHA HTTP] Código de erro: ${response.status}`, true);
                }
            } catch (error) {
                log(`[FALHA DE REDE] Não foi possível conectar a ${ip}.`, true);
                log(`Detalhes: ${error.message} - Verifique se o Agente C# está rodando na porta 5000 e se não há bloqueio no Firewall.`, true);
            }
        }
    </script>
</body>
</html>
